# IT Ticketing Portal — Docker Compose
#
# Topology (current):
#   web : Next.js portal running in a bridge network.
#         The database lives on the same host machine, so DATABASE_URL
#         should use "host-gateway" as the hostname, e.g.:
#           postgresql://portal_app:***@host-gateway:5432/it_ticketing_system
#
#         "host-gateway" is a special Docker alias that resolves to the
#         host machine's internal IP — no Tailscale needed when the DB
#         is local to the server.
#
# Future (Tailscale):
#   When you need to connect to a remote DB over Tailscale, restore the
#   Tailscale sidecar from docker-compose.yml.bak:
#     1. Add the tailscale service back.
#     2. Change web's network_mode to: service:tailscale
#     3. Remove extra_hosts below (not needed via Tailscale MagicDNS).
#     4. Place your auth key in docker/secrets/ts_authkey.
#     5. Update DATABASE_URL host to the remote box's MagicDNS name.

services:
  web:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    # Lets the container reach the host's Postgres via "host-gateway"
    extra_hosts:
      - "host-gateway:host-gateway"
    restart: unless-stopped
